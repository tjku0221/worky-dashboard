/* ─────────────────────────────────────────────────────────────────────────
   Custom date picker
   ───────────────────────────────────────────────────────────────────────── */
const datePicker = {
  el: null, viewMonth: null, bindKey: null, triggerEl: null, _outsideHandler: null,

  open(triggerEl, bindKey) {
    if (this.el && this.triggerEl === triggerEl) { this.close(); return; }
    this.close();
    this.bindKey = bindKey;
    this.triggerEl = triggerEl;
    const v = st.f[bindKey];
    this.viewMonth = v ? new Date(v + 'T00:00:00') : new Date();
    this.viewMonth.setDate(1);

    triggerEl.classList.add('active');
    this.el = document.createElement('div');
    this.el.className = 'date-popover';
    document.body.appendChild(this.el);
    this.render();
    this.position();

    setTimeout(() => {
      this._outsideHandler = (e) => {
        if (!this.el?.contains(e.target) && !this.triggerEl?.contains(e.target)) this.close();
      };
      document.addEventListener('click', this._outsideHandler);
    }, 0);
  },
  close() {
    if (this.el) { this.el.remove(); this.el = null; }
    if (this.triggerEl) { this.triggerEl.classList.remove('active'); this.triggerEl = null; }
    if (this._outsideHandler) { document.removeEventListener('click', this._outsideHandler); this._outsideHandler = null; }
  },
  position() {
    if (!this.el || !this.triggerEl) return;
    const r = this.triggerEl.getBoundingClientRect();
    const popH = 320, popW = 280;
    let top = r.bottom + 8;
    let left = r.left;
    if (top + popH > window.innerHeight - 12) top = r.top - popH - 8;
    if (left + popW > window.innerWidth - 12) left = window.innerWidth - popW - 12;
    if (left < 12) left = 12;
    this.el.style.top = top + 'px';
    this.el.style.left = left + 'px';
  },
  changeMonth(delta) { this.viewMonth.setMonth(this.viewMonth.getMonth() + delta); this.render(); },
  pick(iso) {
    st.f[this.bindKey] = iso;
    this.close();
    renderOverview();
  },
  isoOf(date) {
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  },
  render() {
    const m = this.viewMonth;
    const year = m.getFullYear(), month = m.getMonth();
    const firstDow = new Date(year, month, 1).getDay();
    const lastDay = new Date(year, month+1, 0).getDate();
    const today = new Date(); today.setHours(0,0,0,0);
    const selected = st.f[this.bindKey];

    const cells = [];
    for (let i=0; i<firstDow; i++) cells.push('<div class="date-cell empty"></div>');
    for (let d=1; d<=lastDay; d++) {
      const dt = new Date(year, month, d);
      const iso = this.isoOf(dt);
      let cls = 'date-cell';
      if (iso === selected) cls += ' selected';
      if (dt.getTime() === today.getTime()) cls += ' today';
      cells.push(`<button class="${cls}" onclick="datePicker.pick('${iso}')">${d}</button>`);
    }

    this.el.innerHTML = `
      <div class="date-popover-head">
        <button class="date-nav" onclick="event.stopPropagation(); datePicker.changeMonth(-1)" title="上個月">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="date-month">${year} 年 ${month+1} 月</span>
        <button class="date-nav" onclick="event.stopPropagation(); datePicker.changeMonth(1)" title="下個月">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="date-dow">${['日','一','二','三','四','五','六'].map(d => `<div>${d}</div>`).join('')}</div>
      <div class="date-grid">${cells.join('')}</div>
      <div class="date-popover-foot">
        <button class="btn" onclick="datePicker.pick('')">清除</button>
        <button class="btn primary" onclick="datePicker.pick('${this.isoOf(new Date())}')">今天</button>
      </div>`;
  }
};
window.datePicker = datePicker;
window.addEventListener('resize', () => datePicker.position());

/* ═══════════════════════════════════════════════════════════════════════════
   Tweaks
   ─────────────────────────────────────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "magenta",
  "depth": "med",
  "radius": "pillow",
  "density": "default"
}/*EDITMODE-END*/;

const accentMap = {
  honey:   { rgb:'244,197,118', top:'#6b5018', bot:'#2e2008', topHi:'#8a651f' },
  mint:    { rgb:'94,224,200',  top:'#206a5e', bot:'#0c2a26', topHi:'#2a8074' },
  lilac:   { rgb:'183,148,255', top:'#4a3592', bot:'#1f1450', topHi:'#5d44b3' },
  magenta: { rgb:'244,114,182', top:'#7a2660', bot:'#3a1130', topHi:'#a02c7a' },
};

let tweakState = { ...TWEAK_DEFAULTS };

function applyTweaks() {
  // accent
  const a = accentMap[tweakState.accent] || accentMap.magenta;
  const root = document.documentElement;
  root.style.setProperty('--accent-rgb', a.rgb);
  root.style.setProperty('--accent-top', a.top);
  root.style.setProperty('--accent-bot', a.bot);
  root.style.setProperty('--accent-top-hi', a.topHi);
  // depth + radius
  root.setAttribute('data-depth', tweakState.depth);
  root.setAttribute('data-radius', tweakState.radius);
  // density (CSS variable controls padding scale)
  root.setAttribute('data-density', tweakState.density);

  // active state in UI
  document.querySelectorAll('#accent-swatches .swatch').forEach(s => s.classList.toggle('active', s.dataset.v===tweakState.accent));
  document.querySelectorAll('#depth-seg .seg').forEach(s => s.classList.toggle('active', s.dataset.v===tweakState.depth));
  document.querySelectorAll('#radius-seg .seg').forEach(s => s.classList.toggle('active', s.dataset.v===tweakState.radius));
  document.querySelectorAll('#density-seg .seg').forEach(s => s.classList.toggle('active', s.dataset.v===tweakState.density));
}

function initTweaks() {
  // accent swatches
  const swEl = document.getElementById('accent-swatches');
  Object.entries(accentMap).forEach(([k, v]) => {
    const btn = document.createElement('button');
    btn.className = 'swatch';
    btn.dataset.v = k;
    btn.style.background = `radial-gradient(circle at 35% 30%, rgb(${v.rgb}), ${v.top} 70%, ${v.bot})`;
    btn.style.color = `rgb(${v.rgb})`;
    btn.title = ({honey:'蜂蜜金', mint:'薄荷青', lilac:'紫丁香', magenta:'桃紅'})[k] || k;
    btn.onclick = () => { setTweak('accent', k); };
    swEl.appendChild(btn);
  });
  // seg controls
  document.querySelectorAll('#depth-seg .seg, #radius-seg .seg, #density-seg .seg').forEach(b => {
    b.onclick = () => {
      const key = b.parentElement.id.replace('-seg','');
      setTweak(key, b.dataset.v);
    };
  });
  applyTweaks();

  // edit-mode protocol
  window.addEventListener('message', e => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode')   openTweaks();
    if (d.type === '__deactivate_edit_mode') closeTweaks();
  });
  try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch {}
}

function setTweak(key, value) {
  tweakState[key] = value;
  applyTweaks();
  try {
    const edits = {}; edits[key] = value;
    window.parent.postMessage({type:'__edit_mode_set_keys', edits}, '*');
  } catch {}
}

function toggleTweaks() {
  const tw = document.getElementById('tweaks');
  if (tw.classList.contains('open')) closeTweaks(); else openTweaks();
}

// ═══════════════════════════════════════════════════════════════
// Phase 2 — Microsoft Graph API 驗證（PKCE popup 流程）
// ═══════════════════════════════════════════════════════════════

const MS_CLIENT_ID = 'a4bcea35-fc2c-4ef1-ab4a-b85cc209ec34';
const MS_TENANT_ID = '80ee6094-c90a-47bb-aee1-57f81d9af1f9';
const MS_SCOPES    = ['Files.ReadWrite', 'Files.ReadWrite.All', 'User.Read'];

let msalInstance  = null;
let msAccessToken = null;
let msAccount     = null;

function msIsLocalFile() {
  return location.protocol === 'file:' || location.hostname === '';
}

async function initMsal() {
  if (msIsLocalFile()) { updateMsUI(); return; }
  if (typeof msal === 'undefined') {
    window._msalInitError = '[步驟0] MSAL 未載入（CDN 無法存取）';
    updateMsUI();
    return;
  }
  try {
    const config = {
      auth: {
        clientId:    MS_CLIENT_ID,
        authority:   `https://login.microsoftonline.com/${MS_TENANT_ID}`,
        redirectUri: window.location.href.split('?')[0].split('#')[0],
      },
      cache: {
        cacheLocation:          'localStorage',
        storeAuthStateInCookie: false,
      }
    };
    msalInstance = new msal.PublicClientApplication(config);
  } catch (e) {
    window._msalInitError = '[步驟1] PublicClientApplication 建立失敗：' + (e.message || e);
    msalInstance = null;
    updateMsUI();
    return;
  }
  try {
    await msalInstance.initialize();
  } catch (e) {
    window._msalInitError = '[步驟2] initialize() 失敗：' + (e.message || e);
  }
  try {
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      msAccount = accounts[0];
      await msAcquireTokenSilent();
    }
  } catch (e) {
    console.warn('getAllAccounts 失敗（非致命）:', e);
  }
  updateMsUI();
}

async function msLogin() {
  if (msIsLocalFile()) {
    alert('Microsoft 登入需透過 GitHub Pages 開啟才能使用。\n請前往：https://tjku0221.github.io/worky-dashboard/');
    return;
  }
  if (!msalInstance) {
    const hint = window._msalInitError ? `\n\n錯誤：${window._msalInitError}` : '';
    alert('Microsoft 驗證未初始化，請重新整理頁面後再試。' + hint);
    return;
  }
  try {
    const result  = await msalInstance.loginPopup({ scopes: MS_SCOPES });
    msAccount     = result.account;
    msAccessToken = result.accessToken;
    updateMsUI();
  } catch (e) {
    if (e.name !== 'BrowserAuthError' || !e.message.includes('user_cancelled')) {
      alert('登入失敗：' + (e.message || e));
    }
  }
}

async function msLogout() {
  if (!msalInstance) return;
  try {
    await msalInstance.logoutPopup({ account: msAccount });
  } catch {}
  msAccount     = null;
  msAccessToken = null;
  updateMsUI();
}

async function msAcquireTokenSilent() {
  try {
    const result  = await msalInstance.acquireTokenSilent({ scopes: MS_SCOPES, account: msAccount });
    msAccessToken = result.accessToken;
  } catch (e) {
    if (e.name === 'InteractionRequiredAuthError') {
      try {
        const result  = await msalInstance.acquireTokenPopup({ scopes: MS_SCOPES, account: msAccount });
        msAccessToken = result.accessToken;
      } catch {}
    }
  }
}

function updateMsUI() {
  const notIn   = document.getElementById('ms-not-logged-in');
  const inEl    = document.getElementById('ms-logged-in');
  const nameEl  = document.getElementById('ms-user-name');
  const avatarEl= document.getElementById('ms-avatar');
  if (msAccount) {
    notIn.hidden  = true;
    inEl.hidden   = false;
    const name    = msAccount.name || msAccount.username || '使用者';
    nameEl.textContent   = name;
    avatarEl.textContent = name.charAt(0).toUpperCase();
  } else {
    notIn.hidden = false;
    inEl.hidden  = true;
  }
}

document.addEventListener('DOMContentLoaded', initMsal);
function openTweaks() {
  document.getElementById('tweaks').classList.add('open');
  document.getElementById('tweaks-trigger').style.display = 'none';
}
function closeTweaks() {
  document.getElementById('tweaks').classList.remove('open');
  document.getElementById('tweaks-trigger').style.display = '';
  try { window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); } catch {}
}

</script>
